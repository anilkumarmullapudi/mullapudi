<!DOCTYPE html>
<html>
<head>
<style>
* {
  box-sizing: border-box;
}

input[type=text], select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  resize: vertical;
}

label {
  padding: 12px 12px 12px 0;
  display: inline-block;
}

input[type=submit] {
  background-color: #04AA6D;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  float: right;
}

input[type=submit]:hover {
  background-color: #45a049;
}

.container {
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px;
}

.col-25 {
  float: left;
  width: 25%;
  margin-top: 6px;
}

.col-75 {
  float: left;
  width: 75%;
  margin-top: 6px;
}

/* Clear floats after the columns */
.row::after {
  content: "";
  display: table;
  clear: both;
}

/* Resize the browser window to see the effect. When the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .col-25, .col-75, input[type=submit] {
    width: 100%;
    margin-top: 0;
  }
}
</style>
</head>
<body>

<h2>One Unix WEB PLATFORM</h2>
<p> Below is the web page where it allow users to check uptime for given servers </p>

<div class="container">
  <form action="" method="post">
  <div class="row">
    <div class="col-25">
      <label for="Unix_commands">Unix_commands</label>
    </div>
    <div class="col-75">
      <select id="Unix_commands" name="Unix_commands">
        <option value="uptime">uptime</option>
        <option value="uname -a">uname -a</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col-25">
      <label for="Servers_to_be_executed">Servers_to_be_executed</label>
    </div>
    <div class="col-75">
      <textarea id="Servers_to_be_executed" name="Servers_to_be_executed" placeholder="Enter the server names here...." style="height:200px"></textarea>
    </div>
  </div>
  <br>
  <div class="row">
    <input type="submit" value="Submit">
  </div>
  </form>
</div>

</body>
</html>
